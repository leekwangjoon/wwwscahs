<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>순천청암고등학교 CLOUD SERVICE</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f8f9fa; }
    
    /* 구글 웹앱 주소 프레임 */
    #gas-frame { width: 100%; height: 100%; border: none; display: block; }

    /* 팝업 모달 공통 배경 (어두운 반투명 배경 및 상하좌우 중앙 정렬) */
    .modal-overlay { 
      position: fixed; 
      top: 0; 
      left: 0; 
      width: 100%; 
      height: 100%; 
      background: rgba(0,0,0,0.5); 
      z-index: 99999; 
      display: none; /* 기본 숨김 */
      justify-content: center; 
      align-items: center; 
      padding: 20px; 
      box-sizing: border-box; 
      backdrop-filter: blur(3px); 
      font-family: sans-serif; 
    }

    /* 모달 본체 박스 (크기 조정 및 반응형 디자인) */
    .modal-content { 
      background: white; 
      padding: 30px; 
      border-radius: 20px; 
      max-width: 420px; /* PC 환경 크기 제한 */
      width: 100%;       /* 모바일 반응형 100% */
      box-sizing: border-box;
      text-align: center;
      line-height: 1.6; 
      font-size: 15px; 
      color: #333; 
      box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
      animation: modalFadeIn 0.3s ease-out; /* 부드러운 등장 효과 */
    }

    /* 팝업 등장 애니메이션 */
    @keyframes modalFadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .modal-content b { color: #4A90E2; }

    /* 버튼 공통 스타일 */
    .modal-btn { 
      display: block; 
      width: 100%; 
      margin-top: 12px; 
      padding: 14px; 
      border: none; 
      border-radius: 10px; 
      font-weight: bold; 
      cursor: pointer; 
      font-size: 15px; 
      transition: background 0.2s;
    }

    /* 설치 진행 버튼 (파란색) */
    .action-btn { background: #4A90E2; color: white; }
    .action-btn:hover { background: #357ABD; }

    /* 닫기/취소 버튼 (회색) */
    .close-btn { background: #e9ecef; color: #495057; margin-top: 8px; }
    .close-btn:hover { background: #dee2e6; }
  </style>
</head>
<body>

  <div id="install-banner" class="modal-overlay">
    <div class="modal-content">
      <p id="banner-text" style="margin: 0 0 20px 0; font-size: 16px;"></p>
      <button id="install-btn" class="modal-btn action-btn">지금 설치하기</button>
      <button class="modal-btn close-btn" onclick="document.getElementById('install-banner').style.display='none'">다음에 하기</button>
    </div>
  </div>

  <div id="manual-guide-modal" class="modal-overlay">
    <div class="modal-content">
      <p id="guideMessage" style="margin: 0; text-align: left;"></p>
      <button class="modal-btn close-btn" onclick="document.getElementById('manual-guide-modal').style.display='none'">확인 후 닫기</button>
    </div>
  </div>

  <iframe id="gas-frame" src="https://script.google.com/macros/s/AKfycbwapsNEz-lOBVdo5JixbKYoGj6d9m55D8Xm3lTY93gwNkrtNMJ5gMnkkEx0h4Tae8LBlA/exec"></iframe>
  

  <script>
    // 1. PWA 단독 앱(Standalone) 모드로 실행된 경우 리다이렉트
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) {
      window.location.href = 'https://scahs.kr';
    }

    // 2. 서비스 워커 등록
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('서비스 워커 등록 성공:', reg))
          .catch(err => console.log('서비스 워커 등록 실패:', err));
      });
    }

    // 3. 디바이스 및 브라우저 분석 함수
    function analyzeBrowser() {
      const ua = navigator.userAgent.toLowerCase();
      return {
        isMobile: /iphone|ipad|ipod|android/.test(ua),
        isIOS: /iphone|ipad|ipod/.test(ua),
        isAndroid: /android/.test(ua),
        isSamsung: /samsungbrowser/.test(ua),
        isFirefox: /firefox|fxios/.test(ua),
        isSafari: /safari/.test(ua) && !/chrome|crios|edg|samsungbrowser|naver|kakao/.test(ua),
        isInApp: /kakao|naver|fbav|line/.test(ua)
      };
    }

    let deferredPrompt = null;
    const installBanner = document.getElementById('install-banner');
    const installBtn = document.getElementById('install-btn');
    const bannerText = document.getElementById('banner-text');
    const manualGuideModal = document.getElementById('manual-guide-modal');
    const guideMessage = document.getElementById('guideMessage');

    // 4. 설치 준비 완료 이벤트 (최초 진입 시 자동 팝업 차단 및 텍스트 빌드만 수행)
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault(); // 브라우저 자동 배너 차단
      deferredPrompt = e;  // 트리거 변수 저장
      
      const browser = analyzeBrowser();

      // 기기별 알맞은 텍스트 지정 (노출은 하지 않고 대기)
      if (browser.isMobile) {
        bannerText.innerHTML = '📱 <b>순천청암고 클라우드</b>를<br>핸드폰 홈 화면에 앱으로 설치하세요!';
        installBtn.innerText = '앱 설치하기';
      } else {
        bannerText.innerHTML = '💻 <b>순천청암고 클라우드</b>를<br>바탕화면에 바로가기로 설치하세요!';
        installBtn.innerText = '바로가기 설치';
      }
    });

    // 5. 자동 설치 모달 내 [지금 설치하기] 버튼 클릭 동작
    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        try {
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            installBanner.style.display = 'none';
          }
        } catch (error) {
          console.error("설치 중 오류 발생:", error);
        }
        deferredPrompt = null;
      } else {
        installBanner.style.display = 'none';
        showManualGuide();
      }
    });

    // 6. 설치 완료 이벤트
    window.addEventListener('appinstalled', () => {
      installBanner.style.display = 'none';
      manualGuideModal.style.display = 'none';
      const browser = analyzeBrowser();
      if (browser.isMobile) {
        alert('홈 화면에 순천청암고 앱이 성공적으로 설치되었습니다!');
      } else {
        alert('바탕화면에 순천청암고 바로가기가 성공적으로 설치되었습니다!');
      }
    });

    // 7. 수동 설치 안내 모달 콘텐츠 생성 및 표출 함수
    function showManualGuide() {
      const browser = analyzeBrowser();
      manualGuideModal.style.display = 'flex'; // 중앙 정렬로 오픈

      // 모바일 환경 수동 안내 문구
      if (browser.isMobile) {
        if (browser.isInApp) {
          guideMessage.innerHTML = '⚠️ <b>현재 인앱 브라우저 환경입니다.</b><br><br>오른쪽 위 메뉴(⋮ 또는 ⋯)를 눌러 <b>"다른 브라우저로 열기"</b>를 선택하시면 홈 화면에 바로 설치 창이 나타납니다.';
        } else if (browser.isIOS) {
          if (browser.isSafari) {
            guideMessage.innerHTML = '🍏 <b>아이폰 사파리 앱 추가</b><br><br>1. 하단 중앙의 <b>[공유하기]</b> 버튼(네모 박스 화살표)을 누릅니다.<br>2. 메뉴를 아래로 내려 <b>[홈 화면에 추가]</b>를 눌러주세요.';
          } else {
            guideMessage.innerHTML = '🍏 <b>아이폰 크롬/엣지 앱 추가</b><br><br>1. 주소창 주변의 <b>[공유하기]</b> 버튼을 누릅니다.<br>2. <b>[홈 화면에 추가]</b>를 선택해 주세요.';
          }
        } else if (browser.isSamsung) {
          guideMessage.innerHTML = '📱 <b>삼성 인터넷 앱 추가(자동설치불가시)</b><br><br>화면 우측 하단 메뉴(三) ➡️ <b>[현재 페이지 추가]</b> ➡️ <b>[홈 화면]</b>을 선택해 주세요.';
        } else if (browser.isFirefox) {
          guideMessage.innerHTML = '🦊 <b>파이어폭스 앱 추가(자동설치불가시)</b><br><br>우측 하단 메뉴(⋮)를 누른 뒤 <b>[홈 화면에 추가]</b>를 눌러주세요.';
        } else {
          guideMessage.innerHTML = '📱 <b>핸드폰 홈 화면에 앱 추가(자동설치불가시)</b><br><br>브라우저 메뉴에서 <b>[홈 화면에 추가]</b> 또는 <b>[바로가기 만들기]</b>를 선택해 주세요.';
        }
      } 
      // PC 환경 수동 안내 문구
      else {
        if (browser.isFirefox) {
          guideMessage.innerHTML = '🌐 <b>PC 파이어폭스 안내</b><br><br>파이어폭스는 바탕화면 바로가기 자동 설치를 지원하지 않습니다.<br><b>구글 크롬(Chrome)</b> 또는 <b>MS 엣지(Edge)</b>로 접속하시면 원클릭 설치가 가능합니다.';
        } else {
          guideMessage.innerHTML = '🌐 <b>바탕화면에 바로가기를 만드려면(자동설치불가시)?</b><br><br>' +
            '1. 현재 브라우저 주소창 맨 오른쪽 끝을 확인해 주세요.<br>' +
            '2. 모니터 모양 또는 더하기(+)가 붙은 <b>[앱 설치 아이콘]</b>을 누르시면 됩니다.<br><br>' +
            '아이콘이 없다면(크롬) <b>우측 상단 메뉴(⋮) ➡️ [저장 및 공유] ➡️ [앱 설치]</b>를 눌러주세요.' +
            '아이콘이 없다면(엣지) <b>우측 상단 메뉴(...) ➡️ [기타도구] ➡️ [앱] ➡️ [앱설치]</b>를 눌러주세요.';
        }
      }
    }

    // 8. GAS(iframe) 신호 대기 리스너 (요청이 올 때만 중앙 모달 띄우기)
    window.addEventListener('message', (event) => {
      if (event.data && event.data.action === 'openInstallModal') {
        
        // 원클릭 자동 설치가 가능한 환경일 때 (크롬, 웨일, 엣지 등 PC/안드로이드)
        if (deferredPrompt) {
          installBanner.style.display = 'flex'; 
        } 
        // 자동 설치 인터페이스를 브라우저가 제공하지 않을 때 (아이폰 사파리, 인앱 브라우저 등)
        else {
          showManualGuide(); 
        }
        
      }
    });
  </script>
</body>
</html>
